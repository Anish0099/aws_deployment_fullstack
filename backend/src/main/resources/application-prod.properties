# ============================================
# Production Configuration (AWS RDS MySQL)
# ============================================
# Activate this profile with: --spring.profiles.active=prod
#
# Set these environment variables on your EC2 instance:
#   DB_HOST     = your-rds-endpoint.amazonaws.com
#   DB_PORT     = 3306
#   DB_NAME     = emsdb
#   DB_USERNAME = admin
#   DB_PASSWORD = your-secure-password

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:emsdb}?useSSL=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate for MySQL
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Disable H2 Console in production
spring.h2.console.enabled=false
